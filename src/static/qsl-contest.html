<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>启示录练讲比赛 - 出场顺序抽签</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0d1b2a 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* 星空背景动画 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 标题区域 */
        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(90deg, #ffd700, #ffed4e, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.5);
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #a0c4ff;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .cross-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 30px 0;
            gap: 20px;
        }

        .cross-divider::before,
        .cross-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
        }

        .cross-icon {
            font-size: 2rem;
            color: #ffd700;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px #ffd700, 0 0 20px #ffd700; }
            50% { text-shadow: 0 0 20px #ffd700, 0 0 40px #ffd700; }
        }

        /* 输入区域 */
        .input-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .section-title {
            font-size: 1.5rem;
            color: #ffd700;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '✦';
            color: #ffd700;
        }

        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .name-input {
            flex: 1;
            padding: 15px 25px;
            font-size: 1.1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(160, 196, 255, 0.3);
            border-radius: 12px;
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        .name-input:focus {
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .name-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .btn {
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .btn-add {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-add::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn-add:hover::before {
            left: 100%;
        }

        /* 选手列表 */
        .players-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            min-height: 60px;
        }

        .player-tag {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 215, 0, 0.05));
            border: 1px solid rgba(255, 215, 0, 0.4);
            border-radius: 30px;
            color: #ffd700;
            font-weight: 600;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .player-tag .remove-btn {
            background: none;
            border: none;
            color: #ff6b6b;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .player-tag .remove-btn:hover {
            background: rgba(255, 107, 107, 0.2);
        }

        .empty-hint {
            color: rgba(255, 255, 255, 0.4);
            font-style: italic;
            padding: 20px;
        }

        /* 抽签区域 */
        .draw-section {
            text-align: center;
            margin: 50px 0;
        }

        .draw-display {
            width: 300px;
            height: 300px;
            margin: 0 auto 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(160, 196, 255, 0.1));
            border: 3px solid rgba(255, 215, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.2),
                        inset 0 0 60px rgba(255, 215, 0, 0.1);
        }

        .draw-display::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px dashed rgba(255, 215, 0, 0.3);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .draw-display::after {
            content: '✝';
            position: absolute;
            font-size: 4rem;
            color: rgba(255, 215, 0, 0.3);
        }

        .draw-name {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            z-index: 1;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .draw-name.rolling {
            animation: pulse 0.1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .btn-draw {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 50%, #ffd700 100%);
            color: #1a1a3e;
            font-size: 1.5rem;
            padding: 20px 60px;
            border-radius: 50px;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.4);
        }

        .btn-draw:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 50px rgba(255, 215, 0, 0.6);
        }

        .btn-draw:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-stop {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            color: #fff;
            font-size: 1.5rem;
            padding: 20px 60px;
            border-radius: 50px;
            animation: shake 0.5s ease-in-out infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .btn-stop:hover {
            animation: none;
            transform: scale(1.05);
        }

        /* 结果区域 */
        .results-section {
            margin-top: 50px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .result-card {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(160, 196, 255, 0.1));
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.5s;
        }

        .result-card:hover::before {
            left: 100%;
        }

        .order-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(180deg, #ffd700, #ffed4e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 15px;
        }

        .result-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 10px;
        }

        .result-label {
            font-size: 0.9rem;
            color: #a0c4ff;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .verse-quote {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 15px;
            font-style: italic;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
            padding-top: 15px;
        }

        /* 重置按钮 */
        .btn-reset {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            margin-top: 40px;
        }

        .btn-reset:hover {
            border-color: #ffd700;
            color: #ffd700;
        }

        /* 页脚 */
        .footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-text {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        .footer-verse {
            color: #a0c4ff;
            font-style: italic;
            margin-top: 10px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .title {
                font-size: 2rem;
            }
            
            .draw-display {
                width: 250px;
                height: 250px;
            }
            
            .input-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- 星空背景 -->
    <div class="stars" id="stars"></div>

    <div class="container">
        <!-- 标题 -->
        <header class="header">
            <h1 class="title">APOCALYPSE</h1>
            <p class="subtitle">启示录练讲比赛</p>
            <div class="cross-divider">
                <span class="cross-icon">✝</span>
            </div>
        </header>

        <!-- 输入区域 -->
        <section class="input-section">
            <h2 class="section-title">添加参赛选手</h2>
            <div class="input-group">
                <input type="text" class="name-input" id="nameInput" placeholder="请输入选手姓名..." maxlength="20">
                <button class="btn btn-add" onclick="addPlayer()">添加选手</button>
            </div>
            <div class="players-list" id="playersList">
                <span class="empty-hint">暂无选手，请添加参赛选手...</span>
            </div>
        </section>

        <!-- 抽签区域 -->
        <section class="draw-section" id="drawSection" style="display: none;">
            <div class="cross-divider">
                <span class="cross-icon">✝</span>
            </div>
            <div class="draw-display">
                <div class="draw-name" id="drawName">准备开始</div>
            </div>
            <button class="btn btn-draw" id="drawBtn" onclick="startDraw()">开始抽签</button>
        </section>

        <!-- 结果区域 -->
        <section class="results-section" id="resultsSection" style="display: none;">
            <div class="cross-divider">
                <span class="cross-icon">✝</span>
            </div>
            <h2 class="section-title">抽签结果</h2>
            <div class="results-grid" id="resultsGrid"></div>
            <button class="btn btn-reset" onclick="resetAll()">重新开始</button>
        </section>

        <!-- 页脚 -->
        <footer class="footer">
            <p class="footer-text">愿神祝福每一位参赛者的分享</p>
            <p class="footer-verse">"你要大声喊叫，不可止息，扬起声来，好像吹角。" — 以赛亚书 58:1</p>
        </footer>
    </div>

    <script>
        // 选手列表
        let players = [];
        let results = [];
        let isDrawing = false;
        let drawInterval = null;
        let remainingPlayers = [];

        // 圣经经文
        const verses = [
            "「启示录是耶稣基督的启示」 — 启示录 1:1",
            "「念这书上预言的和那些听见又遵守其中所记载的，都是有福的」 — 启示录 1:3",
            "「我是阿拉法，我是俄梅戛」 — 启示录 1:8",
            "「不要惧怕！我是首先的，我是末后的」 — 启示录 1:17",
            "「圣灵向众教会所说的话，凡有耳的，就应当听」 — 启示录 2:7",
            "「得胜的，我必将神乐园中生命树的果子赐给他吃」 — 启示录 2:7",
            "「看哪，我站在门外叩门」 — 启示录 3:20",
            "「宝座中的羔羊是配得权柄、丰富、智慧、能力、尊贵、荣耀、颂赞的」 — 启示录 5:12",
            "「从今以后，在主里面而死的人有福了」 — 启示录 14:13",
            "「看哪，我必快来！赏罚在我，要照各人所行的报应他」 — 启示录 22:12",
            "「证明这事的说：是了，我必快来！阿们！主耶稣啊，我愿你来！」 — 启示录 22:20"
        ];

        // 初始化星空
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.opacity = Math.random();
                starsContainer.appendChild(star);
            }
        }

        // 添加选手
        function addPlayer() {
            const input = document.getElementById('nameInput');
            const name = input.value.trim();
            
            if (!name) {
                alert('请输入选手姓名');
                return;
            }
            
            if (players.includes(name)) {
                alert('该选手已添加');
                return;
            }
            
            players.push(name);
            input.value = '';
            input.focus();
            updatePlayersList();
            updateDrawSection();
        }

        // 删除选手
        function removePlayer(index) {
            players.splice(index, 1);
            updatePlayersList();
            updateDrawSection();
        }

        // 更新选手列表显示
        function updatePlayersList() {
            const list = document.getElementById('playersList');
            
            if (players.length === 0) {
                list.innerHTML = '<span class="empty-hint">暂无选手，请添加参赛选手...</span>';
                return;
            }
            
            list.innerHTML = players.map((name, index) => `
                <div class="player-tag">
                    <span>${name}</span>
                    <button class="remove-btn" onclick="removePlayer(${index})">×</button>
                </div>
            `).join('');
        }

        // 更新抽签区域显示
        function updateDrawSection() {
            const section = document.getElementById('drawSection');
            if (players.length >= 2) {
                section.style.display = 'block';
            } else {
                section.style.display = 'none';
            }
        }

        // 开始抽签
        function startDraw() {
            if (isDrawing) return;
            
            if (remainingPlayers.length === 0) {
                remainingPlayers = [...players];
                results = [];
                document.getElementById('resultsSection').style.display = 'none';
                document.getElementById('resultsGrid').innerHTML = '';
            }
            
            isDrawing = true;
            const drawBtn = document.getElementById('drawBtn');
            const drawName = document.getElementById('drawName');
            
            drawBtn.textContent = '停止抽签';
            drawBtn.className = 'btn btn-stop';
            drawBtn.onclick = stopDraw;
            drawName.classList.add('rolling');
            
            // 快速滚动名字
            drawInterval = setInterval(() => {
                const randomIndex = Math.floor(Math.random() * remainingPlayers.length);
                drawName.textContent = remainingPlayers[randomIndex];
            }, 80);
        }

        // 停止抽签
        function stopDraw() {
            if (!isDrawing) return;
            
            clearInterval(drawInterval);
            isDrawing = false;
            
            const drawBtn = document.getElementById('drawBtn');
            const drawName = document.getElementById('drawName');
            
            drawName.classList.remove('rolling');
            
            // 随机选出一位选手
            const randomIndex = Math.floor(Math.random() * remainingPlayers.length);
            const selectedPlayer = remainingPlayers[randomIndex];
            
            // 从剩余列表中移除
            remainingPlayers.splice(randomIndex, 1);
            
            // 添加到结果
            results.push(selectedPlayer);
            
            // 显示结果
            drawName.textContent = selectedPlayer;
            drawName.style.animation = 'glow 1s ease-in-out 3';
            
            // 显示结果卡片
            showResults();
            
            // 更新按钮状态
            if (remainingPlayers.length > 0) {
                setTimeout(() => {
                    drawBtn.textContent = '下一位';
                    drawBtn.className = 'btn btn-draw';
                    drawBtn.onclick = startDraw;
                    drawName.textContent = '准备开始';
                    drawName.style.animation = '';
                }, 1500);
            } else {
                drawBtn.style.display = 'none';
                drawName.textContent = '抽签完成';
            }
        }

        // 显示结果
        function showResults() {
            const section = document.getElementById('resultsSection');
            const grid = document.getElementById('resultsGrid');
            
            section.style.display = 'block';
            
            const order = results.length;
            const player = results[results.length - 1];
            const verse = verses[Math.floor(Math.random() * verses.length)];
            
            const card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML = `
                <div class="order-number">${order}</div>
                <div class="result-name">${player}</div>
                <div class="result-label">出场顺序</div>
                <div class="verse-quote">${verse}</div>
            `;
            
            grid.appendChild(card);
            
            // 滚动到结果区域
            setTimeout(() => {
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }

        // 重置所有
        function resetAll() {
            if (confirm('确定要重新开始吗？所有数据将被清空。')) {
                players = [];
                results = [];
                remainingPlayers = [];
                isDrawing = false;
                
                document.getElementById('playersList').innerHTML = '<span class="empty-hint">暂无选手，请添加参赛选手...</span>';
                document.getElementById('drawSection').style.display = 'none';
                document.getElementById('resultsSection').style.display = 'none';
                document.getElementById('resultsGrid').innerHTML = '';
                document.getElementById('drawBtn').style.display = 'inline-block';
                document.getElementById('drawBtn').textContent = '开始抽签';
                document.getElementById('drawBtn').className = 'btn btn-draw';
                document.getElementById('drawBtn').onclick = startDraw;
                document.getElementById('drawName').textContent = '准备开始';
                document.getElementById('nameInput').value = '';
            }
        }

        // 回车键添加选手
        document.getElementById('nameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addPlayer();
            }
        });

        // 初始化
        createStars();
    </script>
</body>
</html>
